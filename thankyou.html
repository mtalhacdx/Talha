<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="images/icon.png">
    <title>Thank You! | Talha</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">   
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #6366f1;
            --text-color: #1f2937;
            --light-text: #6b7280;
            --bg-color: #f9fafb;
            --card-bg: #ffffff;
            --white: #ffffff;
            --dark-bg: #111827;
            --dark-card: #1f2937;
            --dark-text: #f3f4f6;
            --dark-light-text: #d1d5db;
        }

        body.dark-mode {
            --text-color: var(--dark-text);
            --light-text: var(--dark-light-text);
            --bg-color: var(--dark-bg);
            --card-bg: var(--dark-card);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            background: var(--card-bg);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .theme-toggle i {
            font-size: 1.25rem;
            color: var(--light-text);
        }

        body.dark-mode .theme-toggle {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* Thank You Content */
        .thank-you-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 5vw;
            text-align: center;
        }

        .thank-you-container {
            background: var(--card-bg);
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            max-width: 600px;
            width: 100%;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        body.dark-mode .thank-you-container {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
        }

        .thank-you-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--primary-light) 0%, transparent 70%);
            opacity: 0.1;
            z-index: -1;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .checkmark {
            color: var(--primary-color);
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: bounceIn 0.8s ease;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, var(--primary-color), var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
        }

        p {
            font-size: 1.1rem;
            color: var(--light-text);
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }

     

        /* Responsive Design */
        @media (max-width: 768px) {
            .thank-you-container {
                padding: 2rem 1.5rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .checkmark {
                font-size: 4rem;
            }
        }

        @media (max-width: 480px) {
            .thank-you-container {
                padding: 1.5rem 1rem;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            p {
                font-size: 1rem;
            }
            
            .btn {
                padding: 0.8rem 1.8rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Thank You Content -->
    <main class="thank-you-content">
        <div class="thank-you-container animate__animated animate__fadeIn">
            <div class="checkmark">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>Thank You!</h1>
            <p>Your message has been received successfully. I appreciate you reaching out and I'll get back to you as soon as possible. Typically, I respond within 24-48 hours.</p>
            <a href="index.html" class="btn">
                <i class="fas fa-home"></i> Return to Homepage
            </a>
        </div>
    </main>

    <script>
        // Theme toggle functionality
        const themeToggle = document.getElementById('theme-toggle');
        const icon = themeToggle.querySelector('i');
        
        // Check for saved theme preference
        const savedTheme = localStorage.getItem('darkMode');
        if (savedTheme === 'enabled') {
            document.body.classList.add('dark-mode');
            icon.classList.replace('fa-moon', 'fa-sun');
        }
        
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDarkMode = document.body.classList.contains('dark-mode');
            
            // Animate the toggle
            themeToggle.style.transform = 'scale(0.95)';
            setTimeout(() => {
                themeToggle.style.transform = 'scale(1.1)';
                setTimeout(() => {
                    themeToggle.style.transform = 'scale(1)';
                }, 100);
            }, 100);
            
            if (isDarkMode) {
                localStorage.setItem('darkMode', 'enabled');
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                localStorage.setItem('darkMode', 'disabled');
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        });

        // Check URL for theme parameter
        const urlParams = new URLSearchParams(window.location.search);
        const urlTheme = urlParams.get('theme');
        
        if (urlTheme === 'dark') {
            document.body.classList.add('dark-mode');
            localStorage.setItem('darkMode', 'enabled');
            icon.classList.replace('fa-moon', 'fa-sun');
        } else if (urlTheme === 'light') {
            document.body.classList.remove('dark-mode');
            localStorage.setItem('darkMode', 'disabled');
            icon.classList.replace('fa-sun', 'fa-moon');
        }
    </script>
</body>
</html>
